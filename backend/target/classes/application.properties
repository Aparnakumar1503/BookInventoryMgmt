spring.datasource.url=jdbc:postgresql://localhost:5432/book
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Keep existing PostgreSQL data across restarts.
# Run schema.sql/data.sql manually only when you intentionally want a fresh setup.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

server.port=8182

app.security.jwt.secret=${APP_JWT_SECRET:book-inventory-demo-secret-key-book-inventory-demo-secret-key}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:28800000}
app.security.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
