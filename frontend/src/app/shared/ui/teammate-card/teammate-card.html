<a
  routerLink="/modules"
  class="bv-card group block h-full rounded-[1.5rem] p-5 transition duration-200 hover:-translate-y-1 hover:border-[rgba(47,93,98,0.22)] hover:shadow-xl hover:shadow-slate-900/8"
>
  <div class="flex items-center justify-between gap-3">
    <div class="grid h-11 w-11 place-items-center rounded-[0.9rem] bg-[var(--bv-primary-soft)] text-sm font-black text-[var(--bv-primary)]">
      {{ teammate().name.charAt(0) }}
    </div>
    <span class="text-xs font-black uppercase tracking-[0.16em] text-[var(--bv-text-muted)]">Open</span>
  </div>

  <div class="mt-5">
    <h3 class="text-xl font-black text-[var(--bv-text)]">{{ teammate().name }}</h3>
    <p class="mt-1 text-sm font-semibold text-[var(--bv-primary)]">{{ teammate().role }}</p>
    <p class="mt-4 text-sm font-medium leading-6 text-[var(--bv-text-soft)]">{{ teammate().moduleName }}</p>
  </div>

  <div class="bv-muted-block mt-5 p-4">
    <p class="text-xs font-black uppercase tracking-[0.18em] text-[var(--bv-text-muted)]">Modules</p>
    <p class="mt-3 text-sm font-semibold leading-6 text-[var(--bv-text)]">{{ teammate().modules.join(', ') }}</p>
  </div>
</a>
