<aside class="sidebar">
  <div class="module-chip">{{ module.icon }} {{ module.title }}</div>

  @for (group of groupedEndpoints(); track group.title) {
    <section class="endpoint-group">
      <p>{{ group.title }}</p>
      @for (endpoint of group.items; track endpoint.id) {
        <button
          type="button"
          class="endpoint-button"
          [class.active]="endpoint.id === activeEndpointId"
          (click)="endpointSelected.emit(endpoint)"
        >
          <app-method-pill [method]="endpoint.method" />
          <span>{{ endpoint.title }}</span>
        </button>
      }
    </section>
  }

  <a class="switch-link" routerLink="/modules">⌘ Switch Module</a>
</aside>
