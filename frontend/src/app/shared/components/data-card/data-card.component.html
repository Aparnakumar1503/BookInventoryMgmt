<article class="data-card" [routerLink]="['/modules', module.id, 'login']">
  <div class="card-icon">{{ module.icon }}</div>
  <h3>{{ module.title }}</h3>
  <p>{{ module.description }}</p>
  <div class="card-footer">
    <div class="methods">
      @for (endpoint of module.endpoints.slice(0, 4); track endpoint.id) {
        <app-method-pill [method]="endpoint.method" />
      }
    </div>
    <span class="count">{{ module.endpoints.length }} endpoints</span>
  </div>
</article>
