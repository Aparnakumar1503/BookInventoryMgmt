<div class="table-shell">
  <table>
    <thead>
      <tr>
        @for (column of columns; track trackColumn($index, column)) {
          <th>{{ column }}</th>
        }
      </tr>
    </thead>
    <tbody>
      @for (row of rows; track $index) {
        <tr>
          @for (column of columns; track trackColumn($index, column)) {
            <td>{{ row[column] ?? '—' }}</td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>
