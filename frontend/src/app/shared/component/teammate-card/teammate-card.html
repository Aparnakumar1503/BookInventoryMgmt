<p>teammate-card works!</p>
<a
  [routerLink]="['/module', teammate().moduleId]"
  class="group block h-full rounded-3xl border border-white/70 bg-white/85 p-6 shadow-xl shadow-blue-950/5 transition duration-300 hover:-translate-y-2 hover:border-teal-200 hover:shadow-2xl hover:shadow-teal-700/10"
>
  <div class="flex items-start justify-between gap-4">
    <div class="grid h-14 w-14 place-items-center rounded-2xl bg-gradient-to-br from-blue-600 to-teal-500 text-lg font-black text-white shadow-lg shadow-blue-600/20">
      {{ teammate().name.charAt(0) }}
    </div>
    <span class="rounded-full bg-teal-50 px-3 py-1 text-xs font-black text-teal-700 transition group-hover:bg-teal-600 group-hover:text-white">
      Open
    </span>
  </div>
  <div class="mt-6">
    <h3 class="text-xl font-black text-slate-950">{{ teammate().name }}</h3>
    <p class="mt-2 text-sm font-bold text-blue-700">{{ teammate().role }}</p>
    <p class="mt-4 rounded-2xl bg-slate-50 px-4 py-3 text-sm font-bold text-slate-700">{{ teammate().moduleName }}</p>
    <p class="mt-4 break-all text-sm font-semibold text-slate-500">{{ teammate().email }}</p>
  </div>
</a>
