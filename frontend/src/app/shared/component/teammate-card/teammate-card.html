<a
  [routerLink]="['/member', teammate().moduleId]"
  class="bv-card group block h-full rounded-[2rem] p-6 transition duration-300 hover:-translate-y-2 hover:border-[rgba(95,127,111,0.22)] hover:shadow-2xl hover:shadow-teal-700/10"
>
  <div class="flex items-start justify-between gap-4">
    <div class="grid h-14 w-14 place-items-center rounded-[1.2rem] bg-gradient-to-br from-[#d7f1d8] via-[#e7defb] to-[#cfe1ff] text-lg font-black text-slate-800 shadow-lg shadow-slate-700/10">
      {{ teammate().name.charAt(0) }}
    </div>
    <span class="rounded-full bg-[var(--bv-primary-soft)] px-3 py-1 text-xs font-black text-[var(--bv-primary)] transition group-hover:bg-[var(--bv-primary)] group-hover:text-white">
      Open
    </span>
  </div>
  <div class="mt-6">
    <h3 class="bv-display text-2xl text-slate-950">{{ teammate().name }}</h3>
    <p class="mt-2 text-sm font-bold text-[var(--bv-primary)]">{{ teammate().role }}</p>
    <p class="mt-4 rounded-[1.25rem] bg-[rgba(116,128,212,0.08)] px-4 py-3 text-sm font-bold text-slate-700">{{ teammate().moduleName }}</p>
    <p class="mt-4 text-sm font-semibold text-slate-500">Modules: {{ teammate().modules.join(', ') }}</p>
    <p class="mt-2 text-sm font-semibold text-slate-500">Demo login: {{ teammate().username }} / password</p>
  </div>
</a>
