<header class="sticky top-0 z-40 border-b border-[color:var(--bv-border)] bg-[rgba(251,247,239,0.86)] backdrop-blur-xl">
  <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    <a routerLink="/" class="group flex items-center gap-3">
      <span class="grid h-11 w-11 place-items-center rounded-[1.2rem] bg-gradient-to-br from-[#d7f1d8] via-[#e7defb] to-[#cfe1ff] font-black text-slate-800 shadow-lg shadow-slate-700/10 transition group-hover:scale-105">BV</span>
      <span>
        <span class="bv-display block text-3xl leading-none text-slate-950">Book <span class="text-[#7480d4]">Vault</span></span>
        <span class="block text-[0.7rem] font-bold uppercase tracking-[0.28em] text-slate-500">Inventory Explorer</span>
      </span>
    </a>

    <div class="hidden items-center gap-2 lg:flex">
      @for (module of modules(); track module.id) {
        <a
          [routerLink]="['/member', module.id]"
          class="rounded-full px-4 py-2 text-sm font-bold text-slate-600 transition hover:bg-[var(--bv-primary-soft)] hover:text-[var(--bv-primary)]"
        >
          {{ module.name }}
        </a>
      }
    </div>

    @if (currentUser(); as user) {
      <div class="flex items-center gap-3">
        <div class="hidden rounded-full border border-[color:var(--bv-border)] bg-white/80 px-4 py-2 text-sm font-bold text-slate-700 sm:block">
          {{ user.firstName }} {{ user.lastName }}
        </div>
        <button
          type="button"
          (click)="logout()"
          class="bv-button-primary rounded-full px-4 py-2 text-sm font-black text-white transition hover:brightness-105"
        >
          Logout
        </button>
      </div>
    }
  </nav>
</header>
