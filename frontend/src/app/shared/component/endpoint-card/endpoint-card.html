<p>endpoint-card works!</p>
<a
  [routerLink]="['/endpoint-form', moduleId(), endpoint().id]"
  class="group block h-full rounded-3xl border border-slate-200 bg-white p-6 shadow-xl shadow-slate-950/5 transition duration-300 hover:-translate-y-1 hover:border-blue-200 hover:shadow-2xl hover:shadow-blue-700/10"
>
  <div class="flex flex-wrap items-center justify-between gap-3">
    <span class="rounded-full px-3 py-1 text-xs font-black" [class]="methodClass(endpoint().method)">
      {{ endpoint().method }}
    </span>
    <span class="text-sm font-black text-teal-700 transition group-hover:translate-x-1">Test</span>
  </div>
  <h3 class="mt-5 text-xl font-black text-slate-950">{{ endpoint().name }}</h3>
  <code class="mt-3 block break-all rounded-2xl bg-slate-950 px-4 py-3 text-sm font-bold text-teal-100">{{ endpoint().path }}</code>
  <p class="mt-4 text-sm font-medium leading-6 text-slate-600">{{ endpoint().description }}</p>
</a>
