<a
  [routerLink]="['/endpoint-form', moduleId(), endpoint().id]"
  class="bv-card group block h-full rounded-[2rem] p-6 transition duration-300 hover:-translate-y-1 hover:border-[rgba(75,97,224,0.24)] hover:shadow-2xl hover:shadow-blue-700/10"
>
  <div class="flex flex-wrap items-center justify-between gap-3">
    <span class="rounded-full px-3 py-1 text-xs font-black" [class]="methodClass(endpoint().method)">
      {{ endpoint().method }}
    </span>
    <span class="text-sm font-black text-[var(--bv-primary)] transition group-hover:translate-x-1">Open</span>
  </div>
  <h3 class="mt-5 text-xl font-black text-slate-950">{{ endpoint().name }}</h3>
  <code class="bv-code-block mt-3 block break-all rounded-[1.25rem] px-4 py-3 text-sm font-bold">{{ endpoint().path }}</code>
  <p class="mt-4 text-sm font-medium leading-6 text-slate-600">{{ endpoint().description }}</p>
</a>
