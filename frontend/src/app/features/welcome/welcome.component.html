<section class="welcome-page">
  <div class="badge">• Spring Boot REST Explorer</div>
  <h1><span>Book</span><em>Vault</em></h1>
  <p>A complete Inventory Management System</p>
  <p>Explore all 6 modules with live UI responses</p>
  <a class="cta" routerLink="/modules">Explore Modules →</a>

  <div class="module-chips">
    @for (module of modules; track module.id) {
      <span>{{ module.icon }} {{ module.title.split(' ')[0] }}</span>
    }
  </div>
</section>
