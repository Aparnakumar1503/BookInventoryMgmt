<section class="signin-shell">
  <div class="bv-container px-4 py-8 sm:px-6 lg:px-8 lg:py-12">
    <div class="mx-auto grid max-w-5xl gap-6 lg:grid-cols-[minmax(0,0.9fr)_minmax(24rem,1fr)] lg:items-start">
      <section class="signin-side rounded-[1.8rem] px-6 py-7 sm:px-7 sm:py-8">
        <span class="bv-kicker">Secure Access</span>
        <h1 class="bv-display mt-5 text-4xl leading-none text-[var(--bv-text)] sm:text-5xl">
          Sign in
        </h1>
        <p class="bv-page-note mt-4 max-w-md text-base">
          Enter a valid owner account to continue into the protected workspace.
        </p>

        <a
          routerLink="/"
          class="mt-6 inline-flex rounded-full border border-[color:var(--bv-border)] bg-white/80 px-4 py-2.5 text-sm font-black text-[var(--bv-text-soft)] transition hover:bg-[var(--bv-primary-soft)] hover:text-[var(--bv-primary)]"
        >
          Back to Overview
        </a>
      </section>

      <section class="signin-panel rounded-[1.8rem] p-5 sm:p-6">
        <div class="flex flex-col gap-4">
          <div>
            <p class="bv-stat-label">Demo Accounts</p>
            <p class="mt-2 text-sm font-semibold leading-6 text-[var(--bv-text-soft)]">
              Click any account to auto-fill the form. The demo password remains <span class="font-black text-[var(--bv-text)]">password</span>.
            </p>
          </div>

          <div class="flex flex-wrap gap-2">
            @for (teammate of teammates; track teammate.id) {
              <button
                type="button"
                (click)="fillDemo(teammate.username)"
                class="rounded-full border border-[color:var(--bv-border)] bg-white px-3 py-2 text-xs font-black text-[var(--bv-text-soft)] transition hover:bg-[var(--bv-primary-soft)] hover:text-[var(--bv-primary)]"
              >
                {{ teammate.username }}
              </button>
            }
          </div>

          <form class="grid gap-4" [formGroup]="loginForm" (ngSubmit)="login()">
            <label class="block">
              <span class="text-sm font-black text-[var(--bv-text)]">Username</span>
              <input formControlName="username" type="text" class="bv-field mt-2" placeholder="Aparna" />
            </label>

            <label class="block">
              <span class="text-sm font-black text-[var(--bv-text)]">Password</span>
              <input formControlName="password" type="password" class="bv-field mt-2" placeholder="password" />
            </label>

            <button
              type="submit"
              [disabled]="isSubmitting()"
              class="bv-button-primary mt-2 w-full rounded-[1.1rem] px-5 py-3.5 text-sm font-black transition hover:brightness-105 disabled:cursor-not-allowed disabled:opacity-60"
            >
              {{ isSubmitting() ? 'Signing in...' : 'Sign In' }}
            </button>
          </form>
        </div>
      </section>
    </div>
  </div>
</section>
