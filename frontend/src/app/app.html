<div class="min-h-screen bg-white text-slate-900">
  <app-navbar />
  <main>
    <router-outlet />
  </main>

  <div class="fixed right-4 top-24 z-50 w-[min(22rem,calc(100vw-2rem))] space-y-3">
    @for (toast of notificationService.messages(); track toast.id) {
      <button
        type="button"
        class="w-full rounded-2xl border bg-white px-4 py-3 text-left text-sm font-bold shadow-2xl shadow-slate-950/10 transition hover:-translate-y-0.5"
        [class.border-teal-200]="toast.type === 'success'"
        [class.text-teal-800]="toast.type === 'success'"
        [class.border-rose-200]="toast.type === 'error'"
        [class.text-rose-800]="toast.type === 'error'"
        [class.border-blue-200]="toast.type === 'info'"
        [class.text-blue-800]="toast.type === 'info'"
        (click)="notificationService.dismiss(toast.id)"
      >
        {{ toast.message }}
      </button>
    }
  </div>
</div>
