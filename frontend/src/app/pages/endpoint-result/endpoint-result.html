<section class="grid min-h-[70vh] place-items-center bg-gradient-to-br from-blue-50 via-white to-teal-50 px-4 py-12">
  <div class="w-full max-w-3xl">
    <div class="rounded-3xl border border-white/70 bg-white/90 p-8 text-center shadow-2xl shadow-blue-950/10">
      <div class="mx-auto grid h-20 w-20 place-items-center rounded-full bg-teal-100 text-xl font-black text-teal-700">OK</div>
      <h1 class="mt-6 text-4xl font-black text-slate-950">Request completed successfully</h1>
      <p class="mt-3 text-base font-semibold text-slate-600">Redirecting back to the module page.</p>
      <a [routerLink]="['/member', moduleId ?? 'books']" class="mt-6 inline-flex rounded-2xl bg-blue-700 px-6 py-3 text-sm font-black text-white transition hover:bg-blue-800">
        Return now
      </a>
    </div>

    <div class="mt-6">
      <app-response-viewer [response]="response()" />
    </div>
  </div>
</section>
